# Event ID Database for IR Analysis
# Used by Stage 4.2: Event ID Analyzer

# Security Event Log
security_events:
  4624:
    name: "Successful Logon"
    category: "Credential"
    significance: INFO
    expected_volume: 1000
    description: "An account was successfully logged on"

  4625:
    name: "Failed Logon"
    category: "Credential"
    significance: MEDIUM
    expected_volume: 50
    description: "An account failed to log on"

  4634:
    name: "Logoff"
    category: "Credential"
    significance: INFO
    expected_volume: 1000
    description: "An account was logged off"

  4648:
    name: "Explicit Credential Logon"
    category: "Credential"
    significance: HIGH
    expected_volume: 10
    description: "A logon was attempted using explicit credentials"

  4672:
    name: "Admin Logon"
    category: "Credential"
    significance: MEDIUM
    expected_volume: 100
    description: "Special privileges assigned to new logon"

  4688:
    name: "Process Created"
    category: "Execution"
    significance: INFO
    expected_volume: 5000
    description: "A new process has been created"

  4697:
    name: "Service Installed"
    category: "Persistence"
    significance: HIGH
    expected_volume: 5
    description: "A service was installed in the system"

  4698:
    name: "Scheduled Task Created"
    category: "Persistence"
    significance: HIGH
    expected_volume: 5
    description: "A scheduled task was created"

  4699:
    name: "Scheduled Task Deleted"
    category: "Persistence"
    significance: MEDIUM
    expected_volume: 5
    description: "A scheduled task was deleted"

  4700:
    name: "Scheduled Task Enabled"
    category: "Persistence"
    significance: MEDIUM
    expected_volume: 5
    description: "A scheduled task was enabled"

  4702:
    name: "Scheduled Task Updated"
    category: "Persistence"
    significance: MEDIUM
    expected_volume: 10
    description: "A scheduled task was updated"

  4720:
    name: "User Created"
    category: "Persistence"
    significance: HIGH
    expected_volume: 1
    description: "A user account was created"

  4722:
    name: "User Enabled"
    category: "Persistence"
    significance: MEDIUM
    expected_volume: 2
    description: "A user account was enabled"

  4724:
    name: "Password Reset"
    category: "Credential"
    significance: MEDIUM
    expected_volume: 5
    description: "An attempt was made to reset an account's password"

  4728:
    name: "User Added to Global Group"
    category: "Persistence"
    significance: HIGH
    expected_volume: 2
    description: "A member was added to a security-enabled global group"

  4732:
    name: "User Added to Local Group"
    category: "Persistence"
    significance: HIGH
    expected_volume: 2
    description: "A member was added to a security-enabled local group"

  4756:
    name: "User Added to Universal Group"
    category: "Persistence"
    significance: HIGH
    expected_volume: 2
    description: "A member was added to a security-enabled universal group"

  4768:
    name: "Kerberos TGT Request"
    category: "Credential"
    significance: INFO
    expected_volume: 500
    description: "A Kerberos authentication ticket (TGT) was requested"

  4769:
    name: "Kerberos TGS Request"
    category: "Credential"
    significance: MEDIUM
    expected_volume: 100
    description: "A Kerberos service ticket was requested"
    notes: "High volume may indicate Kerberoasting"

  4771:
    name: "Kerberos Pre-Auth Failed"
    category: "Credential"
    significance: HIGH
    expected_volume: 10
    description: "Kerberos pre-authentication failed"

  4776:
    name: "Credential Validation"
    category: "Credential"
    significance: INFO
    expected_volume: 1000
    description: "The domain controller attempted to validate credentials"

  7045:
    name: "Service Installed"
    category: "Persistence"
    significance: HIGH
    expected_volume: 5
    description: "A service was installed in the system (System log)"

  1102:
    name: "Audit Log Cleared"
    category: "Defense Evasion"
    significance: CRITICAL
    expected_volume: 0
    description: "The audit log was cleared"
    notes: "Almost always malicious in an investigation context"

